<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Candidate Results — Recruiter View</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app"></div>
<script src="config.js"></script>
<script src="dom.js"></script>
<script src="results-view.js"></script>
<script>
  const root = document.getElementById("app");

  function renderMsg(title, body) {
    root.innerHTML = "";
    const wrap = el("div", { class: "wrap" });
    wrap.appendChild(brandMasthead("RECRUITER VIEW"));
    const card = el("div", { class: "card" });
    card.appendChild(el("h2", { class: "subtitle" }, title));
    card.appendChild(el("p", { class: "lede" }, body));
    wrap.appendChild(card);
    root.appendChild(wrap);
  }

  const id = new URLSearchParams(window.location.search).get("id");
  const backendConfigured = CONFIG.SCRIPT_URL.indexOf("PASTE_YOUR") !== 0;

  if (!id) {
    renderMsg("No result ID given", "Open this page using the link from the notification email, which includes ?id=… in the URL.");
  } else if (!backendConfigured) {
    renderMsg("Backend not configured", "Set CONFIG.SCRIPT_URL in config.js before results can be looked up.");
  } else {
    renderMsg("Loading…", "Fetching this candidate's results.");
    fetch(CONFIG.SCRIPT_URL + "?" + new URLSearchParams({ action: "result", id }).toString())
      .then(res => { if (!res.ok) throw new Error("HTTP " + res.status); return res.json(); })
      .then(data => {
        if (!data.found) {
          renderMsg("Result not found", "This link may be out of date, or the row was removed from the spreadsheet.");
          return;
        }
        root.innerHTML = "";
        root.appendChild(renderResults(data.result, { audience: "recruiter" }));
      })
      .catch(err => {
        console.error(err);
        renderMsg("Couldn't load this result", "Check your connection and try again, or open the spreadsheet directly.");
      });
  }
</script>
</body>
</html>
